version: "3"

services:
  client:
    build: ./client
    volumes:
      - client_dist:/dist
    command: sh -c "cp -r /app/dist/* /dist"
    networks:
      - ml-service-network

  app:
    build: ./app/
    env_file:
      - ./app/.env
    volumes:
      - ./app:/app
    depends_on:
      database:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - ml-service-network

  ml_worker:
    build: ./ml_worker/
    env_file:
      - ./ml_worker/.env
    restart: unless-stopped
    volumes:
      - ./ml_worker:/app
#    deploy:
#      replicas: 2
    depends_on:
      database:
        condition: service_started
    networks:
      - ml-service-network

  web-proxy:
    build: ./nginx
    ports:
      - 80:80
      - 443:443
    depends_on:
      - app
      - client
    volumes:
      - client_dist:/usr/share/nginx/html
    networks:
      - ml-service-network

  rabbitmq:
    image: rabbitmq:4-management
    hostname: rabbitmq
    env_file:
      - ./rabbit/.env
    ports:
      - 15672:15672
      - 5672:5672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: on-failure
    networks:
      - ml-service-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 30s
      timeout: 10s
      retries: 3

  database:
    image: postgres:16
    expose:
      - 5432
    env_file:
      - ./postgres/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ml-service-network

volumes:
  rabbitmq_data:
  postgres_data:
  client_dist:

networks:
  ml-service-network:
    name: ml-service-network
    driver: bridge

